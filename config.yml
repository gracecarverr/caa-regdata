# config.yml -- single source of truth for the pipeline. Read by R/setup.R.
project: caa-regdata

# Analysis window. Assets keep ALL dated events; panels filter to this window.
window:
  start: 2005
  end: 2025

# Paths are relative to the project root.
paths:
  raw:    data/raw
  clean:  data/clean
  panels: data/panels

# Restrict geography to the 48 contiguous states + DC (excludes AK, HI, territories).
geography:
  conus_only: true

# Raw data sources. Fill in exact endpoints when wiring 01_download.R.
sources:
  icis_air:
    name: "ICIS-Air (EPA ECHO bulk download)"
    url:  "https://echo.epa.gov/files/echodownloads/ICIS-AIR_downloads.zip"
  frs:
    name: "EPA Facility Registry Service (FRS) national combined files"
    url:  "https://www.epa.gov/frs/epa-state-combined-csv-download-files"
  us_counties:
    name: "US county boundaries (Census cartographic boundary shapefile)"
    url:  "https://www.census.gov/geographies/mapping-files/time-series/geo/cartographic-boundary.html"
  greenbook:
    name: "EPA Green Book attainment (+ Wayback snapshots for history)"
    url:  "TODO: confirm Green Book URL; Wayback fetch is semi-manual"
